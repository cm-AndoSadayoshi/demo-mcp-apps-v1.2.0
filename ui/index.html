<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Browser</title>
  <style>
    :root {
      --bg-color: var(--mcp-host-bg, #ffffff);
      --text-color: var(--mcp-host-text, #1a1a1a);
      --border-color: var(--mcp-host-border, #e0e0e0);
      --accent-color: var(--mcp-host-accent, #0066cc);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 16px;
    }

    .container { display: flex; gap: 16px; height: 400px; }

    .resource-list {
      width: 240px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .resource-item {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.15s;
    }

    .resource-item:hover { background: rgba(0, 102, 204, 0.08); }
    .resource-item.active { background: rgba(0, 102, 204, 0.15); }

    .resource-item .name {
      font-weight: 600;
      font-size: 14px;
    }

    .resource-item .uri {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      font-family: monospace;
    }

    .preview {
      flex: 1;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      overflow: auto;
    }

    .preview pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .toolbar h2 { font-size: 16px; }

    .download-btn {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .download-btn:hover { opacity: 0.85; }

    .status {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h2>Resource Browser</h2>
    <span class="status" id="status">読み込み中...</span>
  </div>
  <div class="container">
    <div class="resource-list" id="resourceList"></div>
    <div class="preview" id="preview">
      <p style="color: #888;">左のリストからリソースを選択してください</p>
    </div>
  </div>
  <script type="module" src="./app.ts"></script>
</body>
</html>
